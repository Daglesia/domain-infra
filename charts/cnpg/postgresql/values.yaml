# shared-postgresql values
#
# This chart assumes the CloudNativePG operator is ALREADY installed
# cluster-wide (it is a singleton operator, shared by every chart in the
# cluster — it should not be re-installed per application). Install it once
# with e.g.:
#   helm upgrade --install cnpg \
#     --namespace cnpg-system --create-namespace \
#     oci://ghcr.io/cloudnative-pg/charts/cloudnative-pg
#
# This chart only creates the *Cluster* (the actual Postgres instance) and
# the per-application *Database* objects on top of it.

constants:
  namespace: "data"
  clusterName: "shared-postgresql"
  storage: "25Gi"
  storageClass: "local-path"
  node_affinity_config:
    node_limit:
      matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
            - raspberka-ekran

postgresql:
  # Pinned, not "latest" — predictable upgrades on a small cluster.
  imageName: "ghcr.io/cloudnative-pg/postgresql:16.4"

  # Lightweight by design: a single instance instead of the usual 3-node
  # CNPG HA topology. This trades automatic failover for a much smaller
  # memory/CPU footprint, which is the explicit, accepted trade-off in the
  # ADR ("single point of failure" is acceptable on this hardware).
  instances: 1

  # Keep CNPG's own footprint small too — no extra exporters/pollers unless
  # actually needed.
  monitoring:
    enablePodMonitor: false

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Postgres tuned for a small box, not the CNPG defaults (which assume a
  # much bigger instance). These map straight onto postgresql.conf.
  parameters:
    max_connections: "50"
    shared_buffers: "64MB"
    effective_cache_size: "192MB"
    maintenance_work_mem: "32MB"
    wal_compression: "on"
    log_min_duration_statement: "1000"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - raspberka-ekran

databases:
  - name: forgejo
    owner: forgejo
  - name: penpot
    owner: penpot
  - name: wikijs
    owner: wikijs

pooler:
  enabled: false
