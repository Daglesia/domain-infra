constants:
  storage: "20Gi"
  pvc: "penpot-assets-pvc"
  pv: "penpot-assets-pv"
  storageClass: "penpot-assets-sc"
  node_affinity_config:
    node_limit:
      matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
            - dag-mini-pc

penpot:
  global:
    postgresqlEnabled: false
    valkeyEnabled: false

  persistence:
    assets:
      enabled: true
      size: "20Gi"
      existingClaim: "penpot-assets-pvc"

  config:
    publicUri: "https://design.daglesia.com"
    flags: "enable-login enable-prepl-server disable-registration"
    telemetryEnabled: false
    postgresql:
      host: "penpot-postgresql"
      port: 5432
      database: "penpot"
    redis:
      host: "penpot-valkey"
      port: 6379

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-issuer
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - design.daglesia.com
    tls:
      - secretName: penpot-tls
        hosts:
          - design.daglesia.com

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - dag-mini-pc

postgresql:
  auth:
    database: "penpot"
  volumePermissions:
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
      tag: "12-debian-12-r43"
  primary:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - dag-mini-pc

valkey:
  architecture: standalone
  auth:
    enabled: false
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - dag-mini-pc