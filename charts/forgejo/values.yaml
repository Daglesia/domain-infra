constants:
  storage: "25Gi"
  pvc: "forgejo-git-pvc"
  pv: "forgejo-git-pv"
  node_affinity_config:
    node_limit:
      matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
            - raspberka-ekran

forgejo:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - raspberka-ekran
  gitea:
    config:
      server:
        LFS_START_SERVER: true
        LFS_HTTP_AUTH_EXPIRY: 30m
        LFS_MAX_FILE_SIZE: 0
      lfs:
        PATH: /data/lfs
      actions:
        ENABLED: true
  persistence:
    enabled: true
    create: false
    claimName: forgejo-git-pvc
    volumeName: forgejo-git-pv
    storageClass: local-git-storage
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-issuer
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    hosts:
      - host: git.daglesia.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: forgejo-tls
        hosts:
          - git.daglesia.com

  actions:
    enabled: true
    existingSecret: ""
    existingSecretKey: "token"
    token: ""
    provisioning:
      enabled: true
    statefulset:
      enabled: true
      replicaCount: 1
      image:
        repository: code.forgejo.org/forgejo/runner
        tag: ""
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 2000m
          memory: 2048Mi
      securityContext:
        runAsGroup: 988
        fsGroup: 988
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - dag-mini-pc
      nodeSelector: {}
      tolerations: []
      config:
        labels:
          - "ubuntu-latest:docker://node:20-bookworm"
          - "docker:docker://docker:24-cli"
        dind:
          enabled: false
        storage:
          enabled: true
          size: 5Gi
          accessModes:
            - ReadWriteOnce
      extraVolumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
      extraContainerVolumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock