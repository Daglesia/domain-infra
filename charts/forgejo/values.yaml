constants:
  storage: "25Gi"
  pvc: "forgejo-git-pvc"
  pv: "forgejo-git-pv"
  node_affinity_config:
    node_limit:
      matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
            - raspberka-ekran

forgejo:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - raspberka-ekran
  gitea:
    config:
      server:
        LFS_START_SERVER: true
        LFS_HTTP_AUTH_EXPIRY: 30m
        LFS_MAX_FILE_SIZE: 0
      service:
        DISABLE_REGISTRATION: true
      lfs:
        PATH: /data/lfs
      actions:
        ENABLED: true
      packages:
        ENABLED: true
  persistence:
    enabled: true
    create: false
    claimName: forgejo-git-pvc
    volumeName: forgejo-git-pv
    storageClass: local-git-storage
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-issuer
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    hosts:
      - host: git.daglesia.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: forgejo-tls
        hosts:
          - git.daglesia.com
