apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "forgejo-runner.name" . }}-config
  namespace: forgejo-runner
  labels:
    {{- include "forgejo-runner.labels" . | nindent 4 }}
data:
  config.yml: |
    log:
      level: info

    runner:
      file: /data/.runner
      capacity: {{ .Values.capacity }}
      # Timeout for a single job
      timeout: 3h
      # Graceful shutdown timeout
      shutdown_timeout: 10s
      envs:
        DOCKER_HOST: tcp://localhost:2375
    cache:
      enabled: true
      dir: /data/cache
      # The address job containers will use to reach the cache server.
      # Must be reachable from within DinD — use the pod IP or a Service.
      host: ""      # leave empty: runner auto-detects pod IP
      port: 0       # 0 = random free port
    container:
      network: host
      # Privileged is false — DinD handles that separately
      privileged: false