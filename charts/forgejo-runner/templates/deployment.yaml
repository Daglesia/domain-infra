apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forgejo-runner.name" . }}
  namespace: forgejo-runner
  labels:
    {{- include "forgejo-runner.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "forgejo-runner.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "forgejo-runner.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "forgejo-runner.name" . }}
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: register
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              if [ -f /data/.runner ]; then
                echo "Runner already registered, skipping."
                exit 0
              fi
              if [ ! -w /data ]; then
                echo "ERROR: /data is not writable. Check fsGroup / PVC permissions."
                exit 1
              fi
              echo "Registering runner..."
              forgejo-runner register \
                --no-interactive \
                --instance "$(FORGEJO_INSTANCE_URL)" \
                --token "$(RUNNER_TOKEN)" \
                --name "$(RUNNER_NAME)" \
                --labels "$(RUNNER_LABELS)"
              echo "Registration complete."
          env:
            - name: FORGEJO_INSTANCE_URL
              value: {{ .Values.forgejoInstanceUrl | quote }}
            - name: RUNNER_NAME
              value: {{ .Values.runnerName | quote }}
            - name: RUNNER_LABELS
              value: {{ .Values.runnerLabels | quote }}
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: token
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: runner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              echo "Waiting for Docker daemon..."
              until wget -qO- http://localhost:2375/_ping 2>/dev/null | grep -q OK; do
                sleep 2
              done
              echo "Docker ready, starting runner."
              exec forgejo-runner daemon --config /etc/runner/config.yml
          env:
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
          resources:
            {{- toYaml .Values.resources.runner | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/runner
              readOnly: true
        - name: dind
          image: {{ .Values.dind.image }}
          imagePullPolicy: {{ .Values.dind.pullPolicy }}
          securityContext:
            privileged: true
          command: ["dockerd"]
          args:
            - --host=tcp://0.0.0.0:2375
            - --host=unix:///var/run/docker.sock
          resources:
            {{- toYaml .Values.resources.dind | nindent 12 }}
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "forgejo-runner.name" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "forgejo-runner.name" . }}-config
        - name: dind-storage
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}