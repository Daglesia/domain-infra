apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forgejo-runner.name" . }}
  namespace: forgejo-runner
  labels:
    {{- include "forgejo-runner.labels" . | nindent 4 }}
spec:
  # Single replica — the runner handles concurrency internally via `capacity`
  replicas: 1
  # Recreate avoids two runners fighting over the same PVC
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "forgejo-runner.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "forgejo-runner.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "forgejo-runner.name" . }}
      automountServiceAccountToken: false

      # fsGroup ensures /data is writable by uid 1000 (runner user)
      securityContext:
        fsGroup: 1000

      # ------------------------------------------------------------------ #
      #  INIT CONTAINER — registers the runner exactly once                 #
      # ------------------------------------------------------------------ #
      initContainers:
        - name: register
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              # Skip registration if already done — idempotent across restarts
              if [ -f /data/.runner ]; then
                echo "Runner already registered, skipping."
                exit 0
              fi

              # Fail fast if the volume isn't writable (catches fsGroup misconfiguration)
              if [ ! -w /data ]; then
                echo "ERROR: /data is not writable. Check fsGroup / PVC permissions."
                exit 1
              fi

              echo "Registering runner..."
              forgejo-runner register \
                --no-interactive \
                --instance "$(FORGEJO_INSTANCE_URL)" \
                --token "$(RUNNER_TOKEN)" \
                --name "$(RUNNER_NAME)" \
                --labels "$(RUNNER_LABELS)"

              echo "Registration complete."
          env:
            - name: FORGEJO_INSTANCE_URL
              value: {{ .Values.forgejoInstanceUrl | quote }}
            - name: RUNNER_NAME
              value: {{ .Values.runnerName | quote }}
            - name: RUNNER_LABELS
              value: {{ .Values.runnerLabels | quote }}
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: token
          volumeMounts:
            - name: data
              mountPath: /data

      # ------------------------------------------------------------------ #
      #  MAIN CONTAINERS                                                    #
      # ------------------------------------------------------------------ #
      containers:

        # ---- forgejo-runner -------------------------------------------- #
        - name: runner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - forgejo-runner
            - daemon
            - --config
            - /etc/runner/config.yml
          env:
            # These reach the DinD sidecar in the same pod via localhost
            - name: DOCKER_HOST
              value: "tcp://localhost:2376"
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: /certs/client
          resources:
            {{- toYaml .Values.resources.runner | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # runner writes tmp files
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/runner
              readOnly: true
            - name: dind-certs
              mountPath: /certs
              readOnly: true

        # ---- docker-in-docker ------------------------------------------ #
        - name: dind
          image: {{ .Values.dind.image }}
          imagePullPolicy: {{ .Values.dind.pullPolicy }}
          # DinD must be privileged — this is an unavoidable requirement
          # until the native k8s runner executor lands
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          resources:
            {{- toYaml .Values.resources.dind | nindent 12 }}
          volumeMounts:
            - name: dind-certs
              mountPath: /certs
            - name: dind-storage
              mountPath: /var/lib/docker

      # ------------------------------------------------------------------ #
      #  VOLUMES                                                            #
      # ------------------------------------------------------------------ #
      volumes:
        # Runner state (.runner file, cache)
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "forgejo-runner.name" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}

        # config.yml from ConfigMap
        - name: config
          configMap:
            name: {{ include "forgejo-runner.name" . }}-config

        # TLS certs shared between DinD and the runner
        # emptyDir is ephemeral but that's fine — DinD regenerates certs on start
        - name: dind-certs
          emptyDir: {}

        # Docker layer cache — emptyDir means layers are lost on pod restart
        # Use a PVC here if your builds are slow and you want layer caching
        - name: dind-storage
          emptyDir: {}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}