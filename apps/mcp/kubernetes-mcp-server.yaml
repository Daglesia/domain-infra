apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-mcp-server
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: ghcr.io/containers/charts
      chart: kubernetes-mcp-server
      targetRevision: "0.1.0"
      helm:
        valueFiles:
          - $values/charts/kubernetes-mcp-server/values.yaml
    - repoURL: https://github.com/Daglesia/domain-infra
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true